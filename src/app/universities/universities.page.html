<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      University
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="university-cards">
    @for (uni of featuredUniversities; track uni.id) {
      <ion-card class="university-spotlight-card">
        <img class="card-image" [src]="uni.image" [alt]="uni.name + ' campus'" />

        <ion-card-content>
          <div class="card-header-row">
            <h3 class="card-title">{{ uni.name }}</h3>
            <span class="rank-badge">#{{ uni.rating }}</span>
          </div>

          <p class="card-location">{{ uni.suburb }}, {{ uni.province }}</p>

          <div class="card-metrics">
            <div class="metric">
              <span class="metric-label">Students</span>
              <span class="metric-value">{{ uni.students }}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Popular Programs</span>
              <span class="metric-value">{{ formatPrograms(uni.fields.slice(0, 3)) }}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Application Deadline</span>
              <span class="metric-value">{{ uni.closingDate }}</span>
            </div>
          </div>

          <div class="card-actions">
            <ion-button fill="outline" class="learn-more-btn" href="/tabs/universities">
              Learn More
            </ion-button>
            <ion-button class="apply-now-btn" href="/tabs/profile">
              Apply Now
            </ion-button>
          </div>
        </ion-card-content>
      </ion-card>
    }
  </div>
</ion-content>
