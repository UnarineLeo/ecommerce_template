<ion-header>
  <ion-toolbar>
    <!-- Logo/Brand - Always visible -->
    <ion-buttons slot="start">
      <ion-button href="/tabs/home" class="brand-button">
        <ion-icon name="school-outline" class="brand-icon"></ion-icon>
        <span class="brand-text">UniApply</span>
      </ion-button>
    </ion-buttons>

    <!-- Desktop Navigation -->
    <ion-buttons slot="end" class="desktop-nav">
      <ion-button fill="clear" href="/tabs/home">Home</ion-button>
      <ion-button fill="clear" href="/tabs/universities">Universities</ion-button>
      <ion-button fill="clear" href="/tabs/about">About us</ion-button>
      
      <ion-button class="login-btn">
        <ion-icon slot="start" name="log-in-outline"></ion-icon>
        Log In
      </ion-button>
      <ion-button color="primary" shape="round" href="/tabs/profile" class="profile-btn">
        Profile
      </ion-button>
    </ion-buttons>

    <!-- Mobile Menu Button -->
    <ion-buttons slot="end" class="mobile-nav">
      <ion-button (click)="toggleMenu()">
        <ion-icon slot="icon-only" [name]="menuOpen ? 'close' : 'menu'"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Mobile Menu Dropdown -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <ion-list>
      <ion-item button href="/tabs/home" (click)="closeMenu()">
        <ion-icon slot="start" name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-item>
      
      <ion-item button href="/tabs/universities" (click)="closeMenu()">
        <ion-icon slot="start" name="school-outline"></ion-icon>
        <ion-label>Universities</ion-label>
      </ion-item>
      
      <ion-item button href="/tabs/about" (click)="closeMenu()">
        <ion-icon slot="start" name="information-circle-outline"></ion-icon>
        <ion-label>About us</ion-label>
      </ion-item>
      
      <ion-item button (click)="closeMenu()" class="menu-divider">
        <ion-icon slot="start" name="log-in-outline"></ion-icon>
        <ion-label>Log In</ion-label>
      </ion-item>
      
      <ion-item button href="/tabs/profile" (click)="closeMenu()">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-label>Profile</ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-header>

<ion-tabs>
  <ion-tab-bar slot="bottom" style="display: none;">
    <ion-tab-button tab="home"></ion-tab-button>
    <ion-tab-button tab="universities"></ion-tab-button>
    <ion-tab-button tab="about"></ion-tab-button>
    <ion-tab-button tab="profile"></ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
