<ion-header>
  <ion-toolbar>
    <!-- Logo/Brand - Always visible -->
    <ion-buttons slot="start">
      <ion-button routerLink="/tabs/home" class="brand-button">
        <img src="assets/icon/favicon.ico" alt="UniApply Logo" class="brand-logo">
        <span class="brand-text">Unipply</span>
      </ion-button>
    </ion-buttons>

    <!-- Desktop Navigation -->

    <!-- Desktop Actions -->
    <ion-buttons slot="end" class="desktop-actions">
      <ion-button fill="clear" routerLink="/tabs/home" routerLinkActive="active-tab" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Home</ion-button>
      <ion-button fill="clear" routerLink="/tabs/universities" routerLinkActive="active-tab" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Universities</ion-button>
      <ion-button fill="clear" routerLink="/tabs/our-story" routerLinkActive="active-tab" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Our Story</ion-button>
      <ion-button fill="clear" routerLink="/tabs/contact-us" routerLinkActive="active-tab" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Contact Us</ion-button>
      <ion-button class="login-btn">
        <ion-icon slot="start" name="log-in-outline"></ion-icon>
        Log In
      </ion-button>
      <ion-button color="warning" fill="solid" shape="round" routerLink="/tabs/profile" class="profile-btn">
        Register
      </ion-button>
    </ion-buttons>

    <!-- Mobile Menu Button -->
    <ion-buttons slot="end" class="mobile-nav">
      <ion-button (click)="toggleMenu()">
        <ion-icon slot="icon-only" [name]="menuOpen ? 'close' : 'menu'"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Mobile Menu Dropdown -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <ion-list>
      <ion-item button routerLink="/tabs/home" routerLinkActive="active-mobile-tab" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <ion-icon slot="start" name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-item>
      
      <ion-item button routerLink="/tabs/universities" routerLinkActive="active-mobile-tab" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <ion-icon slot="start" name="school-outline"></ion-icon>
        <ion-label>Universities</ion-label>
      </ion-item>
      
      <ion-item button routerLink="/tabs/our-story" routerLinkActive="active-mobile-tab" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <ion-icon slot="start" name="information-circle-outline"></ion-icon>
        <ion-label>Our Story</ion-label>
      </ion-item>

      <ion-item button routerLink="/tabs/contact-us" routerLinkActive="active-mobile-tab" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <ion-icon slot="start" name="mail-outline"></ion-icon>
        <ion-label>Contact Us</ion-label>
      </ion-item>
      
      <ion-item button (click)="closeMenu()" class="menu-divider">
        <ion-icon slot="start" name="log-in-outline"></ion-icon>
        <ion-label>Log In</ion-label>
      </ion-item>
      
      <ion-item button routerLink="/tabs/profile" routerLinkActive="active-mobile-tab" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        <ion-icon slot="start" name="person-outline"></ion-icon>
        <ion-label>Register</ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-header>

<ion-tabs>
  <ion-tab-bar slot="bottom" style="display: none;">
    <ion-tab-button tab="home"></ion-tab-button>
    <ion-tab-button tab="universities"></ion-tab-button>
    <ion-tab-button tab="our-story"></ion-tab-button>
    <ion-tab-button tab="contact-us"></ion-tab-button>
    <ion-tab-button tab="profile"></ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
