<!-- home.page.html (Dynamic with *ngFor) -->

<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Universities</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="cards-grid">
    
    <ion-card class="university-card" *ngFor="let university of universities; let i = index"
              [style.animation-delay.s]="(i + 1) * 0.1">
      <img [alt]="university.name" [src]="university.imageUrl" />
      
      <div class="card-overlay">
        <div class="overlay-content">
          <h3 class="university-name">{{ university.name }}</h3>
          <div class="location">
            <ion-icon name="location-outline"></ion-icon>
            <span>{{ university.location }}</span>
          </div>
        </div>
      </div>
      
      <ion-card-header>
        <div class="card-stats">
          <div class="ranking">
            <span class="star">⭐</span>
            <span>#{{ university.ranking }} Ranking</span>
          </div>
          <div class="students">
            <ion-icon name="people-outline"></ion-icon>
            <span>{{ university.studentsCount }}</span>
          </div>
        </div>
      </ion-card-header>

      <ion-card-content>
        <div class="programs-section">
          <p class="section-label">Popular Programs:</p>
          <div class="program-tags">
            <ion-chip color="success" *ngFor="let program of university.programs">
              <ion-label>{{ program }}</ion-label>
            </ion-chip>
            <ion-chip color="light" *ngIf="university.additionalProgramsCount > 0">
              <ion-label>+{{ university.additionalProgramsCount }} more</ion-label>
            </ion-chip>
          </div>
        </div>
        
        <p class="deadline">
          Application Deadline: <span class="deadline-date">{{ university.applicationDeadline }}</span>
        </p>
        
        <div class="card-actions">
          <ion-button fill="outline" size="default" (click)="onLearnMore(university)">
            Learn More
          </ion-button>
          <ion-button size="default" (click)="onApplyNow(university)">
            Apply Now
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
